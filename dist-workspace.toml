[workspace]
members = ["cargo:."]

# Config for 'dist'
[dist]
# The preferred dist version to use in CI (Cargo.toml SemVer syntax)
cargo-dist-version = "0.32.0"
# CI backends to support
ci = "github"
# The installers to generate for each app
installers = ["shell", "homebrew"]
# A GitHub repo to push Homebrew formulas to
tap = "IT-Help-San-Diego/homebrew-tap"
# Publish jobs to run in CI
publish-jobs = ["homebrew"]
# Beta tags ARE our releases while the instrument carries the BETA badge —
# without this, prerelease versions (v0.1.0-beta.1) skip the Homebrew publish
# and the documented `brew install` line silently never materializes.
publish-prereleases = true
# GitHub build provenance attestations on all CI-built artifacts — consumers
# can `gh attestation verify`, bounding the blast radius of any build-chain
# compromise (the dist installer itself is version-pinned but not hash-pinned).
github-attestations = true
# Target platforms to build apps for (Rust target-triple syntax)
targets = ["aarch64-apple-darwin", "x86_64-apple-darwin", "x86_64-unknown-linux-gnu"]
# Path that installers should place binaries in
install-path = "CARGO_HOME"
# Whether to install an updater program
install-updater = false
# Prebuilt binaries need a real PostgreSQL server at runtime; make the brew
# install guarantee one is present (users pointing DATABASE_URL at their own
# server — Postgres.app, remote — simply leave the brew one unstarted).
[dist.dependencies.homebrew]
"postgresql@17" = { stage = ["run"] }
