    <text x="40" y="664" font-size="30" fill="#e6ecd6">We hid the wiring so you</text>
    <text x="40" y="702" font-size="30" fill="#e6ecd6">wouldn&#39;t trip on it. The</text>
    <text x="40" y="740" font-size="30" fill="#e6ecd6">drawer still opens. Look</text>
    <text x="40" y="778" font-size="30" fill="#e6ecd6">anytime.</text>

    
    <text x="40" y="826" font-size="14.5" fill="#8ba078">Parnas, 1972 — information hiding.</text>
    <text x="40" y="848" font-size="14.5" fill="#8ba078">A design courtesy, not a wall.</text>
  </g>

  
