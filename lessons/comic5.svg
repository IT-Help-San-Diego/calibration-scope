    <text x="560" y="664" font-size="30" fill="#dde3ee">This one has a name on it.</text>
    <text x="560" y="702" font-size="30" fill="#dde3ee">Not &#39;you don&#39;t need to</text>
    <text x="560" y="740" font-size="30" fill="#dde3ee">look.&#39; You may not look.</text>

    
    <text x="560" y="792" font-size="14.5" fill="#8b95a8">Post-divestiture UNIX licensing — binaries ship,</text>
    <text x="560" y="814" font-size="14.5" fill="#8b95a8">source becomes trade secret. A business decision,</text>
    <text x="560" y="836" font-size="14.5" fill="#8b95a8">made by people, with signatures.</text>
