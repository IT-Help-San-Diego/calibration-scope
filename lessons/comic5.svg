  <line x1="26" y1="924" x2="1566" y2="924" stroke="#2b3143" stroke-width="1.5" stroke-dasharray="3 7"></line>
  <text x="796" y="962" text-anchor="middle" font-size="28" fill="#e6e9f2">Every time the floor dropped, a human said <tspan fill="#e8b04b">&#39;trust it, ship it&#39;</tspan> —</text>
  <text x="796" y="998" text-anchor="middle" font-size="28" fill="#e6e9f2">and handed the dark to someone who <tspan fill="#7c8290">couldn&#39;t say no.</tspan></text>

  
