    <line x1="1080" y1="632" x2="1542" y2="632" stroke="#1c1c24" stroke-width="1.5"></line>
    <text x="1080" y="664" font-size="30" fill="#d6d8e0">Nobody locked this one.</text>
    <text x="1080" y="702" font-size="30" fill="#d6d8e0">We built a thing with no</text>
    <text x="1080" y="740" font-size="30" fill="#d6d8e0">drawer to open — and</text>
    <text x="1080" y="778" font-size="30" fill="#d6d8e0">shipped it grinning.</text>

    
    <text x="1080" y="826" font-size="14.5" fill="#7d818e">Deep networks at scale. Opaque to its own builders.</text>
    <text x="1080" y="848" font-size="14.5" fill="#7d818e">Weights fully open and still unreadable.</text>
