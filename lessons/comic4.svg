    <text x="643" y="1038" font-size="19" fill="#e6f6fb">flattery just <tspan fill="#fbbf24" font-weight="700">loud static</tspan>.</text>

    
    <text x="643" y="1086" font-size="13" class="mono" fill="#8b93a7">signal-to-noise, by carrier:</text>
