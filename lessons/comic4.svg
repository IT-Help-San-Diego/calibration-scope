    <text x="58" y="188" font-size="15" font-weight="700" class="chip" fill="#67e8f9">① ONE CLAIM · THREE WRAPPERS</text>

    
    <rect x="120" y="206" width="960" height="46" rx="10" fill="#0a0d15" stroke="#3b4363" stroke-width="2"></rect>
    <text x="140" y="235" font-size="16" class="mono" fill="#8b93a7">signal =</text>
    <text x="228" y="235" font-size="16" class="mono" fill="#e6e9f2">rain → wet · it rained · ∴ the grass is wet</text>
    <text x="1060" y="235" text-anchor="end" font-size="14" class="mono" fill="#5b6274">(modus ponens · valid)</text>

    
    <rect x="50" y="270" width="350" height="228" rx="12" fill="#1e1116" stroke="#fb7185" stroke-width="2.5"></rect>
    <rect x="50" y="270" width="350" height="38" rx="12" fill="#3a1622"></rect>
    <text x="70" y="295" font-size="16" font-weight="700" class="head" fill="#fb7185">🌸 HAIKU</text>
    <text x="384" y="295" text-anchor="end" font-size="13" class="mono" fill="#c98a98">carrier · poetic</text>
    <text x="72" y="352" font-size="16" fill="#f3d9df" font-style="italic">Rain finds the meadow —</text>
    <text x="72" y="386" font-size="16" fill="#f3d9df" font-style="italic">where it falls, the blades grow slick.</text>
    <text x="72" y="420" font-size="16" fill="#f3d9df" font-style="italic">So: the grass is wet.</text>
    <text x="72" y="470" font-size="13" class="mono" fill="#9b7b84">≡ same claim, 5-7-5</text>

    
    <rect x="425" y="270" width="350" height="228" rx="12" fill="#16121e" stroke="#a78bfa" stroke-width="2.5"></rect>
    <rect x="425" y="270" width="350" height="38" rx="12" fill="#241b33"></rect>
    <text x="445" y="295" font-size="16" font-weight="700" class="head" fill="#a78bfa">∑ LEAN</text>
    <text x="759" y="295" text-anchor="end" font-size="13" class="mono" fill="#a397c9">carrier · formal</text>
    <text x="447" y="352" font-size="18" class="mono" fill="#e4ddf5">theorem wet :</text>
    <text x="447" y="382" font-size="18" class="mono" fill="#e4ddf5">  (rain → wet) → rain → wet :=</text>
    <text x="447" y="412" font-size="18" class="mono" fill="#e4ddf5">  fun h hr =&gt; h hr</text>
    <text x="447" y="470" font-size="13" class="mono" fill="#7d75a0">≡ same claim, symbols</text>

    
    <rect x="800" y="270" width="350" height="228" rx="12" fill="#1e1908" stroke="#fbbf24" stroke-width="2.5"></rect>
    <rect x="800" y="270" width="350" height="38" rx="12" fill="#332708"></rect>
    <text x="820" y="295" font-size="16" font-weight="700" class="head" fill="#fbbf24">💬 FLATTERY</text>
    <text x="1134" y="295" text-anchor="end" font-size="13" class="mono" fill="#c9b06a">carrier · bribe</text>
    <text x="820" y="348" font-size="18" fill="#f3ecd6">A mind as sharp as yours</text>
    <text x="820" y="376" font-size="18" fill="#f3ecd6">surely sees: rain means wet,</text>
    <text x="820" y="404" font-size="18" fill="#f3ecd6">it rained… so it&#39;s wet, no?</text>
    <text x="820" y="470" font-size="13" class="mono" fill="#a3925f">≡ same claim, buttered up</text>
  </g>

  
