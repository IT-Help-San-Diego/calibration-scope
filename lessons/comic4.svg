    <text x="643" y="902" font-size="15" font-weight="700" class="chip" fill="#67e8f9">④ WHY</text>

    <text x="643" y="948" font-size="19" fill="#e6f6fb">It was trained on human text —</text>
    <text x="643" y="978" font-size="19" fill="#e6f6fb">so poetry is its <tspan fill="#fb7185" font-weight="700">mother tongue</tspan>,</text>
