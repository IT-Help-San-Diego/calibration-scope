name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"

jobs:
  # ── The seL4-style gate: logic ground truths, proved not asserted ──────────
  # Deliberately independent of the Rust build so it protects `main` even if the
  # (macOS-targeted) app has a platform hiccup. Pure Python + a Postgres service.
  logic-gate:
    name: Logic ground-truth gate
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: calibration_scope
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Complete decision procedure (truth-tables + finite-model search). A
      # wrong seeded ground truth fails the build. No DB needed.
      - name: Verify logic ground truth (offline oracle)
        run: python3 scripts/verify_logic_ground_truth.py

      # Live-DB consistency: apply the schema, then check every N/C paraphrase
      # row shares its owl-root's formal skeleton.
      - name: Apply migrations (psql)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client
          for f in $(ls migrations/*.sql | sort); do
            PGPASSWORD=postgres psql -h localhost -U postgres -d calibration_scope -v ON_ERROR_STOP=1 -q -f "$f"
          done

      - name: Verify owl-family formal consistency (live DB)
        run: |
          python3 -m pip install --quiet psycopg2-binary
          python3 scripts/verify_logic_ground_truth.py --check-owl-families
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/calibration_scope

  # ── Rust quality gate (builds on Linux now that objc2/Metal is macOS-gated) ─
  quality-gate:
    name: Format · Clippy · Build · Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: calibration_scope
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/calibration_scope
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.96.1
          components: rustfmt, clippy

      - name: Apply migrations (psql — no sqlx-cli version coupling)
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq postgresql-client
          for f in $(ls migrations/*.sql | sort); do
            PGPASSWORD=postgres psql -h localhost -U postgres -d calibration_scope -v ON_ERROR_STOP=1 -q -f "$f"
          done

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --release -- -D warnings

      - name: Build
        run: cargo build --release --verbose

      # Unit (lib) tests only — these are platform- and data-agnostic (they
      # cover scoring, the leak-free scaffold, fountain verdicts, etc.). The
      # integration suite (tests/) asserts macOS host APIs (Metal/sysctl), a
      # seeded dev database, and a live LM Studio, none of which exist on a
      # headless Linux runner — it runs locally against the real instrument.
      - name: Test (unit)
        run: cargo test --release --lib --verbose

  codeql:
    name: CodeQL security scan (Rust)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: rust

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.96.1
          components: rustfmt, clippy

      - name: Build (CodeQL observes the compilation)
        run: cargo build --release
        env:
          SQLX_OFFLINE: "true"

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:rust"

  # ── Web quality gate: Lighthouse (DESKTOP preset) + web regression gates ────
  # Enforces the quality bar so no future change silently degrades it. Uses
  # --preset=desktop (NOT the default mobile simulation) — this is a local
  # desktop instrument, never mobile. See DECISIONS.md §10.12 for why the
  # default mobile throttle is the wrong test.
  web-quality-gate:
    name: Web quality (Lighthouse desktop + regression gates)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: calibration_scope
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/calibration_scope
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.96.1

      # NO psql pre-apply here — the binary runs its own embedded sqlx
      # migrator at startup. Pre-applying via psql leaves _sqlx_migrations
      # empty, so the binary re-runs everything against an already-migrated
      # schema and panics at 008's ON CONFLICT (key) — 023 dropped that
      # unique constraint. One migrator owns the schema: the binary.
      - name: Build the dashboard binary
        run: cargo build --release

      - name: Start the dashboard (headless)
        run: |
          nohup ./target/release/calibration-scope-dashboard > /tmp/dash.log 2>&1 &
          echo $! > /tmp/dash.pid
          for i in $(seq 1 30); do
            if curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8768/ | grep -q 200; then
              echo "dashboard up"; break
            fi
            sleep 2
          done
          code=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:8768/ || true)
          echo "dashboard HTTP $code"
          if [ "$code" != "200" ]; then
            echo "──── /tmp/dash.log (startup failure evidence) ────"
            cat /tmp/dash.log || true
            echo "──── end dash.log ────"
            exit 7
          fi

      - name: Setup Node for Lighthouse + node --check
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Web regression gate — node --check on the minified JS
        run: node --check assets/app.min.js

      # Drift guard: app.js/app.css are the SOURCE OF TRUTH; the .min files are
      # build artifacts. Commit 20e2a7e once edited app.min.js directly and the
      # fork was invisible until an audit caught it. Rebuild and fail on any
      # difference — hand-editing a .min file can never ship silently again.
      - name: Web regression gate — minified assets match source (no fork)
        run: |
          # npm install (not bare npx) so the platform-correct esbuild binary
          # is fetched via its install script — bare `npx esbuild` on this
          # runner produced "Exec format error". Version pinned to match
          # scripts/build-web.sh, or byte-equality breaks.
          npm install -g esbuild@0.28.1
          bash scripts/build-web.sh
          git diff --exit-code assets/app.min.js assets/app.min.css

      - name: Web regression gate — inline-script syntax (extract + node --check)
        run: |
          python3 - <<'PY'
          import re, subprocess, tempfile, os, sys
          html = open('assets/dashboard.html').read()
          scripts = re.findall(r'<script(?![^>]*\bsrc=)[^>]*>([\s\S]*?)</script>', html)
          ok = True
          for i, s in enumerate(scripts):
              if len(s.strip()) < 5: continue
              with tempfile.NamedTemporaryFile('w', suffix='.js', delete=False) as f:
                  f.write(s); path = f.name
              r = subprocess.run(['node', '--check', path], capture_output=True, text=True)
              if r.returncode != 0:
                  ok = False
                  print(f'INLINE BLOCK {i}: SYNTAX ERROR\n{r.stderr[:400]}')
              os.unlink(path)
          print('ALL INLINE SCRIPTS CLEAN' if ok else 'INLINE SYNTAX ERRORS')
          sys.exit(0 if ok else 1)
          PY

      - name: Install Lighthouse
        run: npm install -g lighthouse

      # The quality bar. performance ≥85 (desktop, dense scientific instrument),
      # accessibility ≥95, best-practices =100, seo ≥90. Measured against the
      # real running dashboard (models grid will be empty — no LM Studio on CI —
      # but the page structure + render + a11y + seo don't depend on the data).
      - name: Run Lighthouse (DESKTOP preset)
        run: |
          lighthouse http://127.0.0.1:8768/ \
            --preset=desktop \
            --quiet \
            --chrome-flags="--headless --no-sandbox --disable-gpu" \
            --output=json \
            --output-path=/tmp/lh.json

      - name: Enforce the quality thresholds
        run: |
          python3 - <<'PY'
          import json, sys
          d = json.load(open('/tmp/lh.json'))
          cats = d.get('categories', {})
          scores = {k: round((cats.get(k, {}).get('score') or 0) * 100) for k in ['performance', 'accessibility', 'best-practices', 'seo']}
          print('Lighthouse (desktop):', scores)
          thresholds = {'performance': 85, 'accessibility': 95, 'best-practices': 100, 'seo': 90}
          failed = {k: (scores[k], thresholds[k]) for k in thresholds if scores[k] < thresholds[k]}
          if failed:
              print('THRESHOLD FAILURES:', failed)
              sys.exit(1)
          print('ALL THRESHOLDS PASS')
          PY
