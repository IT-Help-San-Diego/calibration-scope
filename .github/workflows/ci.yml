name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"   # use committed .sqlx cache — no live DB needed to COMPILE

jobs:
  quality-gate:
    name: Format · Clippy · Build · Test
    runs-on: ubuntu-latest
    # Postgres service for integration tests (migrations applied below).
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: calibration_scope
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/calibration_scope
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.1
          components: rustfmt, clippy

      - name: Install sqlx-cli (for migrations)
        run: cargo install sqlx-cli --no-default-features --features postgres --version "^0.9"

      - name: Apply migrations
        run: sqlx migrate run
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/calibration_scope

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --release -- -D warnings

      - name: Build
        run: cargo build --release --verbose

      - name: Test
        run: cargo test --release --verbose
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/calibration_scope

  codeql:
    name: CodeQL security scan (Rust)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: rust

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.96.1
          components: rustfmt, clippy

      - name: Build (CodeQL observes the compilation)
        run: cargo build --release
        env:
          SQLX_OFFLINE: "true"

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:rust"
