name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always
  SQLX_OFFLINE: "true"

jobs:
  quality-gate:
    name: Format · Clippy · Build · Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: calibration_scope
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://postgres:postgres@localhost:5432/calibration_scope
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.96.1
          components: rustfmt, clippy

      - name: Install sqlx-cli
        run: cargo install sqlx-cli --no-default-features --features postgres --version 0.9.3

      - name: Apply migrations
        run: sqlx migrate run
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/calibration_scope

      # seL4-style gate: prove the seeded logic ground truths are LOGICALLY
      # correct by a complete decision procedure (truth-tables + finite-model
      # search), not asserted. A wrong ground truth fails the build.
      - name: Verify logic ground truth (complete decision procedure)
        run: python3 scripts/verify_logic_ground_truth.py

      # Live-DB check: every 'N'/'C' paraphrase row must share its owl-root's
      # formal skeleton — catches a hand-edited prompt drifting from its logic.
      - name: Verify owl-family formal consistency (live DB)
        run: |
          python3 -m pip install --quiet psycopg2-binary
          python3 scripts/verify_logic_ground_truth.py --check-owl-families
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/calibration_scope

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Clippy (deny warnings)
        run: cargo clippy --all-targets --release -- -D warnings

      - name: Build
        run: cargo build --release --verbose

      - name: Test
        run: cargo test --release --verbose

  codeql:
    name: CodeQL security scan (Rust)
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: rust

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: 1.96.1
          components: rustfmt, clippy

      - name: Build (CodeQL observes the compilation)
        run: cargo build --release
        env:
          SQLX_OFFLINE: "true"

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:rust"
